hr_dwh:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | as_number }}"
      user: "{{ env_var('POSTGRES_USER', 'hr_admin') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'hr_password') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'hr') }}"
      schema: public
      threads: 4
